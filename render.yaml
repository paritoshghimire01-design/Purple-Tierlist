services:
  - type: web
    name: purple-tierlist
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.3
      - key: SECRET_KEY
        generateValue: true
      - key: DB_PATH
        value: /opt/render/project/src/storage/data.db
    disk:
      name: storage
      mountPath: /opt/render/project/src/storage
      sizeGB: 1
